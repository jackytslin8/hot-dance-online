<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>熱舞 Online - Retro Dance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #fff;
            overflow: hidden;
            font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #game-container { position: relative; }
        canvas {
            display: block;
            border: 3px solid #ff00ff;
            box-shadow: 0 0 30px rgba(255,0,255,0.4);
            border-radius: 4px;
        }
        .hud {
            position: absolute;
            top: 8px; left: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 16px;
            pointer-events: none;
            z-index: 10;
        }
        #score {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #fff;
        }
        #song-title {
            font-size: 16px;
            color: #0ff;
            text-shadow: 0 0 8px #0ff;
        }
        #combo-text {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 52px;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 0 0 20px #ff0, 0 0 40px #f80;
            opacity: 0;
            transition: all 0.1s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
        }
        #judge-text {
            position: absolute;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
            transition: opacity 0.15s;
        }

        /* 選曲畫面 */
        #song-select {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        #song-select h1 {
            font-size: 36px;
            color: #ff00ff;
            text-shadow: 0 0 20px #f0f, 0 0 40px #f0f;
            margin-bottom: 6px;
            animation: pulse 1.5s infinite;
        }
        #song-select .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            max-width: 480px;
            max-height: 55vh;
            overflow-y: auto;
        }
        .song-list::-webkit-scrollbar { width: 4px; }
        .song-list::-webkit-scrollbar-thumb { background: #f0f; border-radius: 2px; }
        .song-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .song-item:hover {
            background: rgba(255,0,255,0.15);
            border-color: #ff00ff;
            transform: scale(1.02);
        }
        .song-item .title { font-size: 15px; color: #fff; }
        .song-item .bpm { font-size: 13px; color: #0ff; min-width: 70px; text-align: right; }
        .upload-area { margin-top: 12px; text-align: center; }
        .upload-btn {
            background: rgba(0,255,255,0.08);
            border: 1px dashed #0ff;
            color: #0ff;
            padding: 10px 24px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .upload-btn:hover { background: rgba(0,255,255,0.25); }
        #drop-zone {
            margin-top: 8px;
            padding: 12px;
            border: 1px dashed #444;
            border-radius: 6px;
            color: #555;
            font-size: 12px;
            transition: all 0.2s;
        }

        /* 模式選擇 */
        .mode-select {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .mode-btn {
            padding: 6px 16px;
            border: 1px solid #555;
            background: transparent;
            color: #aaa;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
        }
        .mode-btn.active {
            border-color: #ff00ff;
            color: #ff00ff;
            background: rgba(255,0,255,0.1);
        }
        .mode-btn:hover { border-color: #f0f; color: #f0f; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        @keyframes combo-pop {
            0% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="500" height="700"></canvas>

        <!-- 音訊除錯面板 -->
        <div id="audio-debug" style="position:fixed;bottom:10px;right:10px;width:320px;max-height:200px;overflow-y:auto;background:rgba(0,0,0,0.85);color:#0f0;font-family:monospace;font-size:11px;padding:8px;border-radius:4px;z-index:9999;border:1px solid #0f0;"></div>

        <div class="hud">
            <div id="score">SCORE: 0</div>
            <div id="song-title"></div>
        </div>

        <div id="combo-text"></div>
        <div id="judge-text"></div>

        <!-- 選曲畫面 -->
        <div id="song-select">
            <h1>💃 熱舞 ONLINE 💃</h1>
            <div class="subtitle">經典舞蹈遊戲重現</div>
            <div class="mode-select">
                <button class="mode-btn active" data-mode="normal">一般模式</button>
                <button class="mode-btn" data-mode="reverse">反鍵模式</button>
            </div>
            <div class="song-list" id="song-list"></div>
            <div class="upload-area">
                <input type="file" id="mp3-upload" accept="audio/*" style="display:none">
                <button class="upload-btn" onclick="document.getElementById('mp3-upload').click()">📁 上傳 MP3</button>
                <div id="drop-zone">拖放 MP3 到這裡</div>
            </div>
            <div style="margin-top:12px; text-align:center;">
                <button class="upload-btn" style="border-color:#ff0; color:#ff0; background:rgba(255,255,0,0.08);" onclick="startRecordMode()">🎵 錄製譜面</button>
                <div style="color:#666; font-size:11px; margin-top:4px;">選歌後跟著音樂按方向鍵，按空白鍵結束</div>
            </div>
        </div>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/main.js"></script>

    <!-- 錄製譜面結果彈窗 -->
    <div id="record-result" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); z-index:999; padding:30px; overflow-y:auto;">
        <div style="max-width:600px; margin:0 auto;">
            <h2 style="color:#ff0; text-align:center; margin-bottom:10px;">🎵 錄製完成！</h2>
            <div id="record-stats" style="text-align:center; color:#0ff; margin-bottom:15px;"></div>
            <div style="color:#888; font-size:13px; margin-bottom:8px;">複製以下 JSON，貼到 audio.js 的 SONGS 裡的 chart 欄位：</div>
            <textarea id="record-json" style="width:100%; height:300px; background:#1a1a2e; color:#0ff; border:1px solid #333; padding:10px; font-family:monospace; font-size:12px; resize:vertical;"></textarea>
            <div style="text-align:center; margin-top:15px;">
                <button onclick="copyRecordJSON()" style="padding:8px 24px; background:#0ff; color:#000; border:none; border-radius:4px; cursor:pointer; font-size:14px; margin-right:10px;">📋 複製 JSON</button>
                <button onclick="closeRecordResult()" style="padding:8px 24px; background:#555; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:14px;">關閉</button>
            </div>
        </div>
    </div>
</body>
</html>
